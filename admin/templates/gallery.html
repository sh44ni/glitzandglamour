{% extends "base.html" %}

{% block title %}Gallery{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="mb-0">Gallery</h2>
    <button class="btn btn-pink" data-bs-toggle="modal" data-bs-target="#uploadModal">
        <i class="bi bi-plus-lg me-2"></i>Upload Image
    </button>
</div>

<div class="card">
    <div class="card-body">
        {% if images %}
        <div class="gallery-grid">
            {% for image in images %}
            <div class="gallery-item">
                <img src="{{ url_for('gallery_image', filename=image.filename) }}"
                    alt="{{ image.alt_text or 'Gallery image' }}">
                <div class="overlay">
                    <div class="text-center">
                        <span class="badge bg-secondary mb-2">{{ image.category }}</span>
                        <form action="{{ url_for('delete_image', image_id=image.id) }}" method="POST"
                            onsubmit="return confirm('Delete this image?')">
                            <button type="submit" class="btn btn-sm btn-danger">
                                <i class="bi bi-trash"></i> Delete
                            </button>
                        </form>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
        {% else %}
        <div class="text-center py-5">
            <i class="bi bi-images text-muted" style="font-size: 3rem;"></i>
            <p class="text-muted mt-3">No images in gallery</p>
            <button class="btn btn-pink" data-bs-toggle="modal" data-bs-target="#uploadModal">
                <i class="bi bi-plus-lg me-2"></i>Upload First Image
            </button>
        </div>
        {% endif %}
    </div>
</div>

<!-- Upload Modal -->
<div class="modal fade" id="uploadModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <form action="{{ url_for('upload_image') }}" method="POST" enctype="multipart/form-data">
                <div class="modal-header border-secondary">
                    <h5 class="modal-title">Upload Image</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label for="image" class="form-label">Image File</label>
                        <input type="file" class="form-control" id="image" name="image" accept="image/*" required>
                        <small class="text-muted">Max 16MB. Supported: JPG, PNG, GIF, WebP</small>
                    </div>
                    <div class="mb-3">
                        <label for="category" class="form-label">Category</label>
                        <select class="form-select" id="category" name="category">
                            <option value="nails">Nails</option>
                            <option value="facials">Facials</option>
                            <option value="waxing">Waxing</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="alt_text" class="form-label">Alt Text (optional)</label>
                        <input type="text" class="form-control" id="alt_text" name="alt_text"
                            placeholder="Describe the image">
                    </div>
                </div>
                <div class="modal-footer border-secondary">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn btn-pink">Upload</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
